<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d10">
<title>Muse — A Masterpiece for Your Mood</title>
<meta name="description" content="Tell us your mood and where you are — we'll hang a masterpiece just for you.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d10;
    --bg-soft: #141419;
    --ink: #ece7dc;
    --ink-dim: #9b958a;
    --gold: #c9a24b;
    --gold-soft: #a5843e;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Inter', -apple-system, system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100dvh;
    overflow-x: hidden;
  }
  /* ambient museum-wall glow */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(120% 60% at 50% -10%, rgba(201,162,75,.10), transparent 60%),
      radial-gradient(80% 50% at 50% 110%, rgba(60,50,90,.18), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .screen {
    position: relative; z-index: 1;
    min-height: 100dvh;
    display: none;
    flex-direction: column;
    align-items: center;
    padding: max(env(safe-area-inset-top), 20px) 20px max(env(safe-area-inset-bottom), 28px);
  }
  .screen.active { display: flex; animation: fadeUp .6s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: none; }
  }

  /* ============ INTRO ============ */
  #intro { justify-content: center; text-align: center; }
  .eyebrow {
    font-family: var(--sans);
    font-size: 11px; letter-spacing: .32em; text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 18px;
  }
  .eyebrow::before, .eyebrow::after { content: '—'; color: var(--gold-soft); margin: 0 10px; opacity: .6; }
  h1 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(44px, 11vw, 84px);
    line-height: 1.02;
    letter-spacing: .01em;
  }
  h1 em { font-style: italic; color: var(--gold); }
  .tagline {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(17px, 4.5vw, 21px);
    color: var(--ink-dim);
    margin: 16px auto 44px;
    max-width: 30ch;
    line-height: 1.5;
  }
  .controls { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 14px; }
  .field { text-align: left; }
  .field label {
    display: block;
    font-size: 10.5px; letter-spacing: .24em; text-transform: uppercase;
    color: var(--ink-dim);
    margin: 0 0 8px 2px;
  }
  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '';
    position: absolute; right: 18px; top: 50%;
    width: 8px; height: 8px;
    border-right: 1.5px solid var(--gold);
    border-bottom: 1.5px solid var(--gold);
    transform: translateY(-70%) rotate(45deg);
    pointer-events: none;
  }
  select {
    appearance: none; -webkit-appearance: none;
    width: 100%;
    background: var(--bg-soft);
    color: var(--ink);
    border: 1px solid rgba(201,162,75,.28);
    border-radius: 10px;
    padding: 16px 44px 16px 18px;
    font-family: var(--serif);
    font-size: 19px;
    cursor: pointer;
    transition: border-color .25s, box-shadow .25s;
  }
  select:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,162,75,.15);
  }
  select:invalid { color: var(--ink-dim); font-style: italic; }
  option { color: #111; font-family: var(--sans); }

  input[type="text"] {
    width: 100%;
    background: var(--bg-soft);
    color: var(--ink);
    border: 1px solid rgba(201,162,75,.28);
    border-radius: 10px;
    padding: 16px 18px;
    font-family: var(--serif);
    font-size: 19px;
    transition: border-color .25s, box-shadow .25s;
  }
  input[type="text"]::placeholder { color: var(--ink-dim); font-style: italic; }
  input[type="text"]:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,162,75,.15);
  }
  #moodCustom { display: none; margin-top: 10px; }
  #moodCustom.visible { display: block; animation: fadeUp .35s ease both; }

  .loc-row { position: relative; }
  .loc-row input { padding-right: 60px; }
  .loc-btn {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 42px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(201,162,75,.10);
    border: 1px solid rgba(201,162,75,.35);
    border-radius: 8px;
    color: var(--gold);
    cursor: pointer;
    transition: background .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .loc-btn:hover { background: rgba(201,162,75,.22); }
  .loc-btn svg { width: 18px; height: 18px; }
  .loc-btn.busy svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hint {
    font-size: 11.5px; color: var(--ink-dim);
    margin: 8px 2px 0; line-height: 1.5;
  }

  .btn {
    font-family: var(--sans);
    font-size: 13px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase;
    border: none; cursor: pointer;
    border-radius: 10px;
    padding: 18px 26px;
    transition: transform .15s ease, box-shadow .25s, background .25s, opacity .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(.97); }
  .btn-gold {
    margin-top: 14px;
    background: linear-gradient(160deg, #d9b45e, #b08a38);
    color: #17130a;
    box-shadow: 0 8px 28px rgba(201,162,75,.25);
  }
  .btn-gold:hover { box-shadow: 0 10px 34px rgba(201,162,75,.38); }
  .btn:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }

  .intro-artists {
    margin-top: 52px;
    font-family: var(--serif); font-style: italic;
    font-size: 14px; color: var(--ink-dim);
    line-height: 1.7;
    max-width: 42ch;
  }
  .intro-artists strong { color: rgba(236,231,220,.85); font-weight: 500; }

  /* ============ REVEAL ============ */
  #reveal { justify-content: flex-start; }
  .reveal-top {
    width: 100%; max-width: 720px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 2px 18px;
  }
  .back {
    background: none; border: none; cursor: pointer;
    color: var(--ink-dim); font-family: var(--sans);
    font-size: 12px; letter-spacing: .18em; text-transform: uppercase;
    padding: 8px 0;
    transition: color .2s;
  }
  .back:hover { color: var(--gold); }
  .match-chip {
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(201,162,75,.35);
    border-radius: 100px;
    padding: 7px 14px;
    white-space: nowrap;
  }

  .frame {
    width: 100%; max-width: 720px;
    padding: clamp(10px, 2.6vw, 18px);
    background:
      linear-gradient(145deg, #6b5426, #c9a24b 25%, #7a6028 50%, #d9b45e 75%, #5d481f);
    border-radius: 4px;
    box-shadow:
      0 30px 80px rgba(0,0,0,.65),
      0 6px 18px rgba(0,0,0,.5),
      inset 0 0 0 1px rgba(255,235,180,.35);
  }
  .canvas {
    position: relative;
    background: #0a0a0c;
    box-shadow: inset 0 0 30px rgba(0,0,0,.8);
    min-height: 240px;
    display: flex; align-items: center; justify-content: center;
  }
  .canvas img {
    display: block;
    width: 100%; height: auto;
    max-height: 62dvh;
    object-fit: contain;
    opacity: 0;
    transition: opacity .9s ease;
  }
  .canvas img.loaded { opacity: 1; }
  .shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(100deg, transparent 30%, rgba(201,162,75,.08) 50%, transparent 70%);
    background-size: 250% 100%;
    animation: shimmer 1.4s infinite linear;
  }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -50% 0; } }
  .canvas.done .shimmer { display: none; }

  .plaque {
    width: 100%; max-width: 720px;
    text-align: center;
    padding: 26px 8px 8px;
  }
  .plaque h2 {
    font-family: var(--serif); font-weight: 500;
    font-size: clamp(26px, 6.4vw, 38px);
    line-height: 1.12;
  }
  .plaque .artist {
    font-family: var(--serif); font-style: italic;
    font-size: clamp(17px, 4.4vw, 20px);
    color: var(--gold);
    margin-top: 6px;
  }
  .plaque .museum {
    font-size: 11.5px; letter-spacing: .16em; text-transform: uppercase;
    color: var(--ink-dim);
    margin-top: 10px;
  }
  .plaque .why {
    font-family: var(--serif); font-style: italic;
    font-size: clamp(16px, 4.2vw, 19px);
    color: rgba(236,231,220,.75);
    line-height: 1.55;
    max-width: 46ch;
    margin: 18px auto 0;
  }
  .plaque .why::before { content: '“'; color: var(--gold); }
  .plaque .why::after  { content: '”'; color: var(--gold); }

  .actions {
    width: 100%; max-width: 480px;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 28px;
  }
  .btn-outline {
    background: rgba(201,162,75,.06);
    color: var(--gold);
    border: 1px solid rgba(201,162,75,.4);
    display: flex; align-items: center; justify-content: center; gap: 9px;
    padding: 15px 10px;
    font-size: 12px;
  }
  .btn-outline:hover { background: rgba(201,162,75,.14); }
  .btn-outline svg { width: 17px; height: 17px; flex: none; }
  .btn-ghost {
    grid-column: 1 / -1;
    background: none;
    color: var(--ink-dim);
    border: 1px solid rgba(236,231,220,.14);
    font-size: 12px;
    padding: 14px;
  }
  .btn-ghost:hover { color: var(--ink); border-color: rgba(236,231,220,.3); }

  footer {
    position: relative; z-index: 1;
    text-align: center;
    font-size: 10.5px; color: rgba(155,149,138,.6);
    padding: 8px 24px 26px;
    line-height: 1.7;
  }

  #toast {
    position: fixed; left: 50%; bottom: max(env(safe-area-inset-bottom), 24px);
    transform: translateX(-50%) translateY(20px);
    background: #1d1d24;
    border: 1px solid rgba(201,162,75,.4);
    color: var(--ink);
    font-size: 13.5px; line-height: 1.5;
    padding: 13px 20px;
    border-radius: 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,.6);
    max-width: min(92vw, 420px);
    text-align: center;
    opacity: 0; pointer-events: none;
    transition: opacity .3s, transform .3s;
    z-index: 50;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (min-width: 700px) {
    .actions { grid-template-columns: 1fr 1fr 1fr; }
    .btn-ghost { grid-column: auto; }
  }
</style>
</head>
<body>

<!-- ============ INTRO SCREEN ============ -->
<section class="screen active" id="intro">
  <p class="eyebrow">The Mood Gallery</p>
  <h1>Muse<em>.</em></h1>
  <p class="tagline">Tell us how you feel and where you are — we'll hang a masterpiece just for you.</p>

  <div class="controls">
    <div class="field">
      <label for="mood">Your mood</label>
      <div class="select-wrap">
        <select id="mood" required>
          <option value="" disabled selected>How do you feel?</option>
          <option value="joyful">Joyful</option>
          <option value="melancholic">Melancholic</option>
          <option value="dreamy">Dreamy</option>
          <option value="dramatic">Dramatic</option>
          <option value="energetic">Energetic</option>
          <option value="peaceful">Peaceful</option>
          <option value="romantic">Romantic</option>
          <option value="curious">Curious</option>
          <option value="rebellious">Rebellious</option>
          <option value="__custom">Something else…</option>
        </select>
      </div>
      <input type="text" id="moodCustom" placeholder="Name your feeling…" autocomplete="off" maxlength="40">
    </div>
    <div class="field">
      <label for="locInput">Your location</label>
      <div class="loc-row">
        <input type="text" id="locInput" placeholder="Where are you?" autocomplete="off">
        <button type="button" class="loc-btn" id="locBtn" aria-label="Use my current location">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
        </button>
      </div>
      <p class="hint" id="locHint">Tap the arrow and we'll match the art to your surroundings — or type a place.</p>
    </div>
    <button class="btn btn-gold" id="revealBtn" disabled>Reveal my masterpiece</button>
  </div>

  <p class="intro-artists">
    From the collections of <strong>Caravaggio</strong>, <strong>Hieronymus Bosch</strong>,
    <strong>Pablo Picasso</strong>, <strong>Raffaello</strong> &amp; <strong>Salvador Dalí</strong>
  </p>
</section>

<!-- ============ REVEAL SCREEN ============ -->
<section class="screen" id="reveal">
  <div class="reveal-top">
    <button class="back" id="backBtn">← Change mood</button>
    <span class="match-chip" id="matchChip"></span>
  </div>

  <div class="frame">
    <div class="canvas" id="canvas">
      <div class="shimmer"></div>
      <img id="artwork" alt="" crossorigin="anonymous">
    </div>
  </div>

  <div class="plaque">
    <h2 id="pTitle"></h2>
    <p class="artist" id="pArtist"></p>
    <p class="museum" id="pMuseum"></p>
    <p class="why" id="pWhy"></p>
  </div>

  <div class="actions">
    <button class="btn btn-outline" id="downloadBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download
    </button>
    <button class="btn btn-outline" id="shareBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.4" cy="6.6" r="1.1" fill="currentColor" stroke="none"/></svg>
      Instagram
    </button>
    <button class="btn btn-ghost" id="anotherBtn">Show me another</button>
  </div>
</section>

<div id="toast" role="status"></div>

<script>
const ART = [

const MOOD_LABEL = { joyful:"Joyful", melancholic:"Melancholic", dreamy:"Dreamy", dramatic:"Dramatic",
                     energetic:"Energetic", peaceful:"Peaceful", romantic:"Romantic", curious:"Curious",
                     rebellious:"Rebellious" };

const SYNONYMS = {
  joyful:      ["happy","glad","cheerful","delighted","content","grateful","optimistic","ecstatic","elated","playful","silly","fun","joy","sunny","hopeful","proud"],
  melancholic: ["sad","blue","down","depressed","gloomy","wistful","nostalgic","lonely","heartbroken","homesick","somber","grieving","melancholy","tearful","hurt"],
  dreamy:      ["sleepy","surreal","floaty","imaginative","whimsical","spacey","pensive","reflective","introspective","thoughtful","daydreaming","hazy"],
  dramatic:    ["intense","anxious","stressed","overwhelmed","tense","scared","afraid","fearful","dark","passionate","fierce","brooding","moody"],
  energetic:   ["excited","hyper","pumped","motivated","energized","lively","vibrant","thrilled","spirited","exuberant","dynamic","restless","adventurous","inspired","stoked"],
  peaceful:    ["calm","relaxed","serene","tranquil","tired","cozy","quiet","zen","mellow","chill","rested","meditative","soothed","sleepy","exhausted","drained","weary","burnt out","burned out"],
  romantic:    ["loving","love","loved","affectionate","tender","longing","yearning","flirty","sensual","smitten"],
  curious:     ["bored","interested","wondering","inquisitive","exploring","fascinated","thinking","puzzled","searching","confused"],
  rebellious:  ["angry","defiant","frustrated","furious","rage","wild","mischievous","bold","daring","punk","annoyed"],
};

function resolveMood(text) {
  const t = text.trim().toLowerCase();
  if (!t) return null;
  if (MOOD_LABEL[t]) return t;
  for (const [key, words] of Object.entries(SYNONYMS)) {
    if (key.startsWith(t) || t.startsWith(key)) return key;
    for (const w of words)
      if (w === t || (t.length >= 4 && (w.startsWith(t) || t.startsWith(w)))) return key;
  }
  return 'curious'; // an open mind suits a feeling we don't recognize
}

const $ = id => document.getElementById(id);
const moodSel = $('mood'), moodCustom = $('moodCustom'),
      locInput = $('locInput'), locBtn = $('locBtn'), locHint = $('locHint'),
      revealBtn = $('revealBtn');
let queue = [], qi = 0, current = null;
let currentMood = null;
let loc = { key: null, label: '', query: '' };

function moodChoice() {
  if (moodSel.value === '__custom') {
    const txt = moodCustom.value.trim();
    return txt ? { key: resolveMood(txt), label: txt } : null;
  }
  return moodSel.value ? { key: moodSel.value, label: MOOD_LABEL[moodSel.value] } : null;
}

function checkReady() { revealBtn.disabled = !moodChoice(); }
moodSel.addEventListener('change', () => {
  moodCustom.classList.toggle('visible', moodSel.value === '__custom');
  if (moodSel.value === '__custom') moodCustom.focus();
  checkReady();
});
moodCustom.addEventListener('input', checkReady);

/* ——— location: geolocate or geocode typed place, then classify the surroundings ——— */
const SEA_RX = /\b(sea|ocean|coast|coastal|beach|bay|island|isle|harbor|harbour|marina|port|cape|shore)\b/i;
const LOC_VIBE = { sea:"by the water", mountains:"up in the mountains", city:"among the city lights", country:"in open country" };

function classify({ elevation = 0, coastal = false, isCity = false }) {
  if (elevation >= 900) return 'mountains';
  if (coastal) return 'sea';
  return isCity ? 'city' : 'country';
}

async function getElevation(lat, lon) {
  try {
    const r = await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lon}`);
    return (await r.json()).elevation[0] || 0;
  } catch { return 0; }
}

locBtn.addEventListener('click', () => {
  if (!navigator.geolocation) {
    locHint.textContent = "Location isn't available in this browser — just type where you are.";
    return;
  }
  locBtn.classList.add('busy');
  locHint.textContent = 'Finding you…';
  navigator.geolocation.getCurrentPosition(async pos => {
    const { latitude: lat, longitude: lon } = pos.coords;
    try {
      const [geo, elevation] = await Promise.all([
        fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`).then(r => r.json()),
        getElevation(lat, lon),
      ]);
      const place = geo.city || geo.locality || geo.principalSubdivision || 'your area';
      const coastal = SEA_RX.test(JSON.stringify(geo.localityInfo || {})) || SEA_RX.test(place);
      loc = { key: classify({ elevation, coastal, isCity: !!geo.city }), label: place, query: place };
      locInput.value = place;
      locHint.textContent = place + ' — ' + LOC_VIBE[loc.key] + '.';
    } catch {
      locHint.textContent = "Couldn't look that up — type your location instead.";
    }
    locBtn.classList.remove('busy');
  }, err => {
    locBtn.classList.remove('busy');
    locHint.textContent = err.code === 1
      ? 'No problem — type where you are instead.'
      : "Couldn't get a fix — type where you are instead.";
  }, { timeout: 10000, maximumAge: 300000 });
});

async function geocodeTyped(q) {
  const r = await fetch('https://geocoding-api.open-meteo.com/v1/search?count=1&language=en&name=' + encodeURIComponent(q));
  const hit = ((await r.json()).results || [])[0];
  if (!hit) return { key: SEA_RX.test(q) ? 'sea' : null, label: q, query: q };
  const coastal = SEA_RX.test(q) || SEA_RX.test(hit.name);
  const isCity = (hit.population || 0) >= 80000 || /^PPLC/.test(hit.feature_code || '');
  return { key: classify({ elevation: hit.elevation || 0, coastal, isCity }), label: hit.name, query: q };
}

function buildQueue(mood, locKey) {
  const scored = ART.map(p => ({
    p,
    s: (p.moods.includes(mood) ? 3 : 0) + (locKey && p.locs.includes(locKey) ? 1 : 0) + Math.random() * 0.5
  }));
  scored.sort((a, b) => b.s - a.s);
  const matches = scored.filter(x => x.s >= 3);
  return (matches.length ? matches : scored).map(x => x.p);
}

function show(p) {
  current = p;
  const img = $('artwork'), canvas = $('canvas');
  img.classList.remove('loaded');
  canvas.classList.remove('done');
  img.src = '';
  img.alt = p.t + ' by ' + p.a;
  img.onload = () => { img.classList.add('loaded'); canvas.classList.add('done'); };
  img.src = p.u;
  $('pTitle').textContent = p.t;
  $('pArtist').textContent = p.a + ', ' + p.y;
  $('pMuseum').textContent = p.m;
  $('pWhy').textContent = p.why;
  $('matchChip').textContent = currentMood.label + (loc.label ? ' · ' + loc.label : '');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

revealBtn.addEventListener('click', async () => {
  const mood = moodChoice();
  if (!mood) return;
  const typed = locInput.value.trim();
  if (typed && typed !== loc.query) {
    revealBtn.textContent = 'Reading the map…';
    try { loc = await geocodeTyped(typed); }
    catch { loc = { key: null, label: typed, query: typed }; }
    revealBtn.textContent = 'Reveal my masterpiece';
  } else if (!typed) {
    loc = { key: null, label: '', query: '' };
  }
  currentMood = mood;
  queue = buildQueue(mood.key, loc.key);
  qi = 0;
  $('intro').classList.remove('active');
  $('reveal').classList.add('active');
  show(queue[0]);
});

$('anotherBtn').addEventListener('click', () => {
  qi = (qi + 1) % queue.length;
  show(queue[qi]);
});

$('backBtn').addEventListener('click', () => {
  $('reveal').classList.remove('active');
  $('intro').classList.add('active');
});

let toastTimer;
function toast(msg, ms = 3800) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), ms);
}

const slug = p => (p.a + '-' + p.t).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');

async function fetchImage(p) {
  const res = await fetch(p.u, { mode: 'cors' });
  if (!res.ok) throw new Error('fetch failed');
  return res.blob();
}

$('downloadBtn').addEventListener('click', async () => {
  if (!current) return;
  toast('Preparing your download…', 2000);
  try {
    const blob = await fetchImage(current);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = slug(current) + '.jpg';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 4000);
    toast('Saved — “' + current.t + '” is yours.');
  } catch {
    window.open(current.u, '_blank');
    toast('Opened full image in a new tab — long-press or right-click to save.');
  }
});

$('shareBtn').addEventListener('click', async () => {
  if (!current) return;
  const text = '“' + current.t + '” — ' + current.a + ', ' + current.y + '  #art #masterpiece';
  try {
    const blob = await fetchImage(current);
    const file = new File([blob], slug(current) + '.jpg', { type: blob.type || 'image/jpeg' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: current.t, text });
      return;
    }
    throw new Error('no file share');
  } catch (e) {
    if (e.name === 'AbortError') return; // user closed the share sheet
    // Desktop / unsupported: save the image and point them to Instagram
    try {
      const blob = await fetchImage(current);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = slug(current) + '.jpg';
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 4000);
    } catch {}
    window.open('https://www.instagram.com/', '_blank');
    toast('Image saved. Instagram is open — create a post and pick it from your gallery.');
  }
});
</script>
